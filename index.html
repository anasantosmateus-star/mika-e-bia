<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Trânsito Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="inicio">
        <h1>🚦 Missão Trânsito Seguro 🚦</h1>

        <p>Digite seu nome:</p>

        <input type="text" id="nome" placeholder="Seu nome">

        <p>Escolha seu personagem:</p>

        <select id="personagem">
            <option>🚶 Pedestre Consciente</option>
            <option>🚲 Ciclista Seguro</option>
            <option>🚗 Motorista Responsável</option>
            <option>👮 Guarda de Trânsito</option>
        </select>

        <button onclick="iniciarJogo()">Começar</button>
    </div>

    <div id="quiz" style="display:none;">

        <h2 id="pergunta"></h2>

        <div id="respostas"></div>

        <p id="mensagem"></p>

        <div class="barra">
            <div id="progresso"></div>
        </div>

        <h3 id="pontos">Pontos: 0</h3>

    </div>

    <div id="certificado" style="display:none;">

        <h1>🏆 CERTIFICADO 🏆</h1>

        <h2>Guardião do Trânsito</h2>

        <p>Certificamos que</p>

        <h2 id="nomeFinal"></h2>

        <p>Concluiu com sucesso o jogo educativo
        <b>Missão Trânsito Seguro</b>.</p>

        <p id="personagemFinal"></p>

        <h3 id="pontosFinal"></h3>

        <h2 id="medalha"></h2>

        <p><b>Respeitar o trânsito salva vidas.</b></p>

        <button onclick="location.reload()">Jogar Novamente</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
