<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Trânsito Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="inicio">
        <h1>🚦 Missão Trânsito Seguro 🚦</h1>

        <p>Digite seu nome:</p>

        <input type="text" id="nome" placeholder="Seu nome">

        <button onclick="iniciarJogo()">Começar Jogo</button>
    </div>

    <div id="quiz" style="display:none;">

        <h2 id="pergunta"></h2>

        <div id="respostas"></div>

        <p id="mensagem"></p>

        <div class="barra">
            <div id="progresso"></div>
        </div>

        <h3 id="pontos">Pontos: 0</h3>

    </div>

    <div id="certificado" style="display:none;">

        <h1>🏆 Certificado 🏆</h1>

        <h2 id="nomeFinal"></h2>

        <p>Concluiu o jogo <strong>Missão Trânsito Seguro</strong>.</p>

        <p id="pontuacaoFinal"></p>

        <p id="medalha"></p>

        <p><strong>Respeitar o trânsito salva vidas!</strong></p>

        <button onclick="location.reload()">
            Jogar Novamente
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
